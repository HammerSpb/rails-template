---
EnableDefaultLinters: true

# --lint-all walks the whole tree; without this it lints ERB templates
# inside vendored gems (vendor/bundle) and reports their errors as ours.
exclude:
  - 'vendor/**/*'
  - 'bin/**/*'
  - 'node_modules/**/*'
  - 'tmp/**/*'

linters:
  AllowedScriptType:
    enabled: true
    allowed_types:
      - text/javascript
      - module
      - importmap

  ClosingErbTagIndent:
    enabled: true

  CommentSyntax:
    enabled: true

  ErbSafety:
    enabled: true

  FinalNewline:
    enabled: true

  HardCodedString:
    enabled: false

  NoJavascriptTagHelper:
    enabled: true

  ParserErrors:
    enabled: true

  RequireInputAutocomplete:
    enabled: true

  RightTrim:
    enabled: true

  SelfClosingTag:
    enabled: true

  SpaceAroundErbTag:
    enabled: true

  SpaceIndentation:
    enabled: true

  SpaceInHtmlTag:
    enabled: true

  TrailingWhitespace:
    enabled: true
