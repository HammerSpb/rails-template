---
EnableDefaultLinters: true

linters:
  AllowedScriptType:
    enabled: true
    allowed_types:
      - text/javascript
      - module
      - importmap

  ClosingErbTagIndent:
    enabled: true

  CommentSyntax:
    enabled: true

  ErbSafety:
    enabled: true

  FinalNewline:
    enabled: true

  HardCodedString:
    enabled: false

  NoJavascriptTagHelper:
    enabled: true

  ParserErrors:
    enabled: true

  RequireInputAutocomplete:
    enabled: true

  RightTrim:
    enabled: true

  SelfClosingTag:
    enabled: true

  SpaceAroundErbTag:
    enabled: true

  SpaceIndentation:
    enabled: true

  SpaceInHtmlTag:
    enabled: true

  TrailingWhitespace:
    enabled: true
