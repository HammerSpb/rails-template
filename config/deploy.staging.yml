# Staging deploy config.
# Run with: bin/kamal deploy -d staging

service: myapp-staging
image: myapp

servers:
  web:
    - 127.0.0.1

proxy:
  ssl: false
  app_port: 3000
  host: myapp-staging.local
  # ssl_certificate_path: /etc/ssl/certs/myapp-staging.pem
  # ssl_certificate_key_path: /etc/ssl/private/myapp-staging-key.pem
  healthcheck:
    path: /up
    interval: 3
    timeout: 3

registry:
  server: localhost:5555
  username: ""
  password: ""

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: myapp-staging-db
    RAILS_ENV: staging
    RAILS_LOG_TO_STDOUT: "1"

ssh:
  user: roman
  port: 22

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "myapp_staging_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  args:
    GIT_SHA: <%= %x(git rev-parse --short HEAD).strip %>
    APP_VERSION: <%= %x(git describe --tags --always 2>/dev/null || echo dev).strip %>

accessories:
  db:
    image: postgres:16-alpine
    host: 127.0.0.1
    port: "127.0.0.1:5433:5432"
    env:
      clear:
        POSTGRES_USER: myapp
        POSTGRES_DB: myapp_staging
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
