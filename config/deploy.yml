# Production deploy config.
# Run with: bin/kamal deploy

service: myapp
image: myapp

servers:
  web:
    - 127.0.0.1

# Self-signed certs via mkcert are mounted into kamal-proxy below.
# When migrating to a real host, switch to Let's Encrypt by setting `ssl: true`
# and `host: your-domain.com` (and remove the custom cert paths).
proxy:
  ssl: false
  app_port: 3000
  host: myapp.local
  # When deploying to a real domain, set ssl: true and host: your-domain.com
  # for automatic Let's Encrypt. For local HTTPS, see bin/generate-local-certs.
  # ssl_certificate_path: /etc/ssl/certs/myapp.pem
  # ssl_certificate_key_path: /etc/ssl/private/myapp-key.pem
  healthcheck:
    path: /up
    interval: 3
    timeout: 3

# Use 127.0.0.1 (not localhost) so Kamal treats this as a normal remote
# registry and skips its built-in local-registry auto-management + SSH
# reverse tunnel — both of which collide with a real local registry when
# the deploy target is also localhost. Docker still treats 127.0.0.1
# as insecure-by-default, so plain HTTP works.
registry:
  server: 127.0.0.1:5555
  username: kamal
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: myapp-db
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"

ssh:
  user: <%= ENV["USER"] %>
  port: 2222

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "myapp_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  # Use the host's docker daemon (driver: docker) instead of a separate
  # docker-container buildx builder. The container builder has its own
  # network namespace and can't reach a registry at 127.0.0.1 on the host.
  driver: docker
  args:
    GIT_SHA: <%= %x(git rev-parse --short HEAD).strip %>
    APP_VERSION: <%= %x(git describe --tags --always 2>/dev/null || echo dev).strip %>

accessories:
  db:
    image: postgres:18-alpine
    host: 127.0.0.1
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: myapp
        POSTGRES_DB: myapp_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
