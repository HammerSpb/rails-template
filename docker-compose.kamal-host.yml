name: rails-template-kamal-host

# Linux deploy target for Kamal. Run with: make kamal-host-up
#
# Path alignment: the project dir is bind-mounted at the SAME path
# inside the container, so when Kamal does `docker run -v $PWD/...`
# (via the mounted socket), the host docker daemon can resolve the
# bind-mount source.

services:
  kamal-host:
    build:
      context: ./kamal-host
      # The container user mirrors the host user so bind-mounted files keep
      # correct ownership. `make kamal-host-up` exports HOST_UID/HOST_GID
      # from `id -u`/`id -g`; USER and PWD come from the shell.
      args:
        USER_NAME: ${USER}
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
        USER_HOME: ${PWD}
    container_name: rails-template-kamal-host
    restart: unless-stopped
    hostname: kamal-host
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
      - ${HOME}/.ssh/id_ed25519.pub:/etc/ssh/authorized_keys.d/${USER}:ro
